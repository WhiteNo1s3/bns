# Modest, stable heap: R8 + Kotlin fit in 4G; 8G+4G could exhaust machine RAM
# alongside the Dart AOT compilers and killed the daemon (2026-07-06).
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

android.suppressUnsupportedCompileSdk=37
