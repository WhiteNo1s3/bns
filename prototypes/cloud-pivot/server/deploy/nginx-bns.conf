# BNS sync server — nginx reverse proxy with the SSL you already manage.
# Install: copy to /etc/nginx/sites-available/bns, edit server_name, then:
#   sudo ln -s /etc/nginx/sites-available/bns /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d bns.example.de     # or your usual cert flow
#   sudo nginx -t && sudo systemctl reload nginx
#
# The Node process listens only on 127.0.0.1 behind this — nothing reaches
# it except through TLS. Body size matches the server's own 200MB cap.

server {
    listen 80;
    listen [::]:80;
    server_name bns.example.de;   # <-- your domain

    # certbot will add the 443 server block + redirect. Until then, keep 80
    # only for the ACME challenge; the API itself should be HTTPS-only.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

