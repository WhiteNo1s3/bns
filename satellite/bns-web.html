<!DOCTYPE html>
<html lang="en">

<title>BNS Web — your .bns, everywhere</title>
<!--
  BNS Web satellite — a complete, single-file .bns manager.

  Rules of the house:
  - NO server, NO npm, NO install, NO account, NO network calls. Ever.
  - Everything happens in this page's memory. Close the tab, nothing remains.
  - Reads and writes the same zip-v2 .bns format as the native BNS app
    (identity marker at bytes 30..54, SHA-256 integrity seal, CRC-verified).
  - The .bns FILE is the sync: AirDrop / Files / USB / share it, the app merges.

  Credits — open technology used as-is, no ownership claimed:
  ZIP (PKWARE APPNOTE), DEFLATE/GZIP (RFC 1951/1952), JSON (ECMA-404),
  SHA-256 (FIPS 180-4) via WebCrypto.
-->
<style>
:root{
  --teal:#0f766e; --teal-soft:#14b8a6; --teal-bg:#f0fdfa; --ink:#134e4a;
  --card:#ffffff; --line:#99f6e4; --muted:#5f7a76; --warn:#b45309;
  --danger:#b91c1c; --ok:#15803d; --chip:#ccfbf1;
}
@media (prefers-color-scheme: dark){
  :root{
    --teal:#2dd4bf; --teal-soft:#14b8a6; --teal-bg:#0b1f1d; --ink:#d7f5f0;
    --card:#12302d; --line:#1e4a45; --muted:#8fb5af; --warn:#fbbf24;
    --danger:#f87171; --ok:#4ade80; --chip:#134e4a;
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
  background:var(--teal-bg); color:var(--ink); min-height:100vh;
  display:flex; flex-direction:column;
}
header{
  background:linear-gradient(135deg,#0f766e,#0d9488);
  color:#f0fdfa; padding:14px 18px; display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:5;
}

header .tag{font-size:12px; opacity:.85; margin-top:2px}
main{flex:1; width:100%; max-width:860px; margin:0 auto; padding:14px 14px 110px}
.banner{border-radius:12px; padding:12px 14px; margin:10px 0; font-size:14px; line-height:1.5}
.banner.ok{background:var(--chip); color:var(--ok); border:1px solid var(--line)}

}

button{
  font-family:inherit; font-size:15px; border:none; border-radius:12px;
  padding:12px 18px; cursor:pointer; min-height:48px;
  background:var(--teal); color:#f0fdfa; font-weight:600;
}

<body>
<header>
  <span class="brain">🧠</span>
  <div>
    <h1>BNS Web</h1>
    <div class="tag">Your .bns, everywhere. Nothing leaves this device.</div>
  </div>

  <span class="dot" id="dirtydot" style="display:none">●</span>

<script>
'use strict';
/*BNS-CORE-START*/
/* ============================================================
   BNS container core — the second official implementation of
   zip-v2 (the first lives in lib/data/pack/bns_zip_packer.dart).
   Pure functions, no DOM: testable headlessly under Node.
   ============================================================ */
const te = new TextEncoder();
const td = new TextDecoder();
const BNS_MEDIA_TYPE = 'application/x-bns';

class BnsError extends Error {}

const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c;
  }
  return t;
})();
function crc32(b) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < b.length; i++) c = CRC_TABLE[(c ^ b[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}

async function pipeBytes(bytes, stream) {
  const resp = new Response(new Blob([bytes]).stream().pipeThrough(stream));
  return new Uint8Array(await resp.arrayBuffer());
}
const gzipBytes = (b) => pipeBytes(b, new CompressionStream('gzip'));
const gunzipBytes = (b) => pipeBytes(b, new DecompressionStream('gzip'));
const inflateRaw = (b) => pipeBytes(b, new DecompressionStream('deflate-raw'));

async function sha256Hex(bytes) {
  const buf = await crypto.subtle.digest('SHA-256', bytes);
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, '0')).join('');
}

/* Fixed-offset identity check — mirrors BnsImporter.hasBnsMark. */
function hasBnsMark(bytes) {
  const name = 'mimetype', content = BNS_MEDIA_TYPE;
  const end = 30 + name.length + content.length;
  if (bytes.length < end || bytes[0] !== 0x50 || bytes[1] !== 0x4B) return false;
  return td.decode(bytes.subarray(30, 38)) === name &&
         td.decode(bytes.subarray(38, end)) === content;
}

const DAMAGED_MSG = 'This .bns file is damaged (failed the container check). ' +
  'Try another copy — nothing on this page was changed.';

/* Reads a ZIP: central-directory driven, CRC-verified, STORE + DEFLATE. */
async function readZip(bytes) {
  const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  let eocd = -1;
  const floor = Math.max(0, bytes.length - 65557);
  for (let i = bytes.length - 22; i >= floor; i--) {
    if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd < 0) throw new BnsError(DAMAGED_MSG);
  const count = dv.getUint16(eocd + 10, true);
  let off = dv.getUint32(eocd + 16, true);
  const out = [];
  for (let i = 0; i < count; i++) {
    if (dv.getUint32(off, true) !== 0x02014b50) throw new BnsError(DAMAGED_MSG);
    const method = dv.getUint16(off + 10, true);
    const crc = dv.getUint32(off + 16, true) >>> 0;
    const compSize = dv.getUint32(off + 20, true);
    const uncompSize = dv.getUint32(off + 24, true);
    const nLen = dv.getUint16(off + 28, true);
    const eLen = dv.getUint16(off + 30, true);
    const cLen = dv.getUint16(off + 32, true);
    const lOff = dv.getUint32(off + 42, true);
    const name = td.decode(bytes.subarray(off + 46, off + 46 + nLen));
    if (dv.getUint32(lOff, true) !== 0x04034b50) throw new BnsError(DAMAGED_MSG);
    const lnLen = dv.getUint16(lOff + 26, true);
    const leLen = dv.getUint16(lOff + 28, true);
    const start = lOff + 30 + lnLen + leLen;
    const comp = bytes.subarray(start, start + compSize);
    let content;
    if (method === 0) content = comp;
    else if (method === 8) content = await inflateRaw(comp);
    else throw new BnsError(DAMAGED_MSG);
    if (content.length !== uncompSize || crc32(content) !== crc) {
      throw new BnsError(DAMAGED_MSG);
    }
    if (!name.endsWith('/')) out.push({ name, bytes: content });
    off += 46 + nLen + eLen + cLen;
  }
  return out;
}

/* Writes a ZIP with every entry STORED — identical layout rules to
   BnsZipPacker: 30-byte local header means entry #1's name starts at
   byte 30, which is what puts the identity marker at bytes 30..54. */
function writeZip(files) {
  const now = new Date();
  const dosTime = (now.getHours() << 11) | (now.getMinutes() << 5) | (now.getSeconds() >> 1);
  const dosDate = ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();
  const chunks = [];
  const central = [];
  let offset = 0;
  for (const f of files) {
    const nameB = te.encode(f.name);
    const crc = crc32(f.bytes);
    const sz = f.bytes.length;
    const lh = new Uint8Array(30 + nameB.length);
    const dv = new DataView(lh.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true);           // version needed
    dv.setUint16(10, dosTime, true);
    dv.setUint16(12, dosDate, true);
    dv.setUint32(14, crc, true);
    dv.setUint32(18, sz, true);          // compressed (STORE: same)
    dv.setUint32(22, sz, true);          // uncompressed
    dv.setUint16(26, nameB.length, true);
    lh.set(nameB, 30);
    chunks.push(lh, f.bytes);
    central.push({ nameB, crc, sz, offset });
    offset += lh.length + sz;
  }
  const cdStart = offset;
  for (const c of central) {
    const ch = new Uint8Array(46 + c.nameB.length);
    const dv = new DataView(ch.buffer);
    dv.setUint32(0, 0x02014b50, true);
    dv.setUint16(4, 20, true);
    dv.setUint16(6, 20, true);
    dv.setUint16(12, dosTime, true);
    dv.setUint16(14, dosDate, true);
    dv.setUint32(16, c.crc, true);
    dv.setUint32(20, c.sz, true);
    dv.setUint32(24, c.sz, true);
    dv.setUint16(28, c.nameB.length, true);
    dv.setUint32(42, c.offset, true);
    ch.set(c.nameB, 46);
    chunks.push(ch);
    offset += ch.length;
  }
  const eocd = new Uint8Array(22);
  const dv = new DataView(eocd.buffer);
  dv.setUint32(0, 0x06054b50, true);
  dv.setUint16(8, central.length, true);
  dv.setUint16(10, central.length, true);
  dv.setUint32(12, offset - cdStart, true);
  dv.setUint32(16, cdStart, true);
  chunks.push(eocd);
  const out = new Uint8Array(offset + 22);
  let p = 0;
  for (const ch of chunks) { out.set(ch, p); p += ch.length; }
  return out;
}

/* SHA-256 integrity seal check shared by both container formats. */
async function verifySeal(manifest, dataGz, audio) {
  const integrity = manifest.integrity;
  if (!integrity || typeof integrity !== 'object') return false;
  if (dataGz && typeof integrity.data === 'string' &&
      (await sha256Hex(dataGz)) !== integrity.data) {
    throw new BnsError('This .bns file failed its integrity check (contents were ' +
      'altered or corrupted in transit). Nothing was opened.');
  }
  const audioSeals = integrity.audio;
  if (audioSeals && typeof audioSeals === 'object') {
    for (const a of audio) {
      const expected = audioSeals[a.name];
      if (typeof expected === 'string' && (await sha256Hex(a.bytes)) !== expected) {
        throw new BnsError(`Voice note "${a.name}" failed its integrity check. Nothing was opened.`);
      }
    }
  }
  return true;
}

/* BNS2 (bns2-v1) — the length-prefixed binary container. Mirrors
   lib/data/pack/bns_binary_packer.dart: magic "BNS2", u32le-prefixed
   manifest / data.json.gz / audio entries, same seal, same refusals. */
function hasBns2Magic(bytes) {
  return bytes.length >= 16 && bytes[0] === 0x42 && bytes[1] === 0x4E &&
         bytes[2] === 0x53 && bytes[3] === 0x32; // "BNS2"
}
async function parseBns2(bytes) {
  const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  let offset = 4;
  const u32 = () => {
    if (offset + 4 > bytes.length) throw new BnsError(DAMAGED_MSG);
    const v = dv.getUint32(offset, true);
    offset += 4;
    return v;
  };
  const take = (len) => {
    if (len < 0 || offset + len > bytes.length) throw new BnsError(DAMAGED_MSG);
    const s = bytes.subarray(offset, offset + len);
    offset += len;
    return s;
  };
  let manifest;
  try { manifest = JSON.parse(td.decode(take(u32()))); }
  catch (e) {
    if (e instanceof BnsError) throw e;
    throw new BnsError('Not a BNS backup — missing manifest or data inside the file.');
  }
  const dataGz = take(u32());
  const count = u32();
  const audio = [];
  for (let i = 0; i < count; i++) {
    const name = td.decode(take(u32()));
    audio.push({ name, bytes: take(u32()) });
  }
  const sealed = await verifySeal(manifest, dataGz, audio);
  const data = JSON.parse(td.decode(await gunzipBytes(dataGz)));
  // The BNS2 magic at offset 0 IS the identity marker for this format.
  return { manifest, data, audio, sealed, marked: true };
}

/* Full .bns open — detects the container (zip-v2 or bns2-v1), then runs
   structure + CRC + SHA-256 checks with the same friendly refusals as the
   Dart packers. Accepts legacy v1 zips. */
async function parseBns(bytes) {
  if (hasBns2Magic(bytes)) return parseBns2(bytes);
  if (!(bytes.length >= 50 && bytes[0] === 0x50 && bytes[1] === 0x4B)) {
    throw new BnsError('Not a BNS backup — only real .bns files can be opened.');
  }
  const entries = await readZip(bytes);
  let manifest = null, dataGz = null, dataPlain = null;
  const audio = [];
  for (const e of entries) {
    if (e.name === 'manifest.json') manifest = JSON.parse(td.decode(e.bytes));
    else if (e.name === 'data.json.gz') dataGz = e.bytes;
    else if (e.name === 'data.json') dataPlain = e.bytes;
    else if (e.name.startsWith('audio/')) audio.push({ name: e.name.slice(6), bytes: e.bytes });
  }
  if (!manifest || (!dataGz && !dataPlain)) {
    throw new BnsError('Not a BNS backup — missing manifest or data inside the file.');
  }
  const sealed = await verifySeal(manifest, dataGz, audio);
  const raw = dataGz ? await gunzipBytes(dataGz) : dataPlain;
  const data = JSON.parse(td.decode(raw));
  return { manifest, data, audio, sealed, marked: hasBnsMark(bytes) };
}

/* Full .bns build: gzip-once data, seal manifest with SHA-256 block,
   marker first — byte-compatible with what the Flutter app writes. */
async function buildBns({ manifest, data, audio }) {
  const gz = await gzipBytes(te.encode(JSON.stringify(data)));
  const audioHashes = {};
  for (const a of audio) audioHashes[a.name] = await sha256Hex(a.bytes);
  const sealedManifest = {
    ...manifest,
    packer: 'zip-v2',
    integrity: { algorithm: 'sha256', data: await sha256Hex(gz), audio: audioHashes },
  };
  return writeZip([
    { name: 'mimetype', bytes: te.encode(BNS_MEDIA_TYPE) },
    { name: 'manifest.json', bytes: te.encode(JSON.stringify(sealedManifest)) },
    { name: 'data.json.gz', bytes: gz },
    ...audio.map(a => ({ name: 'audio/' + a.name, bytes: a.bytes })),
  ]);
}
/*BNS-CORE-END*/

/* ============================================================
   App state + helpers
   ============================================================ */
const S = {
  manifest: null, data: null, audio: [],
  dirty: false, handle: null, fileName: null,
  sealed: false, marked: false, tab: 'today', notice: null,
  // Family mode: a read-only, dumb-simple window for the caregiver's /
  // kid's computer. Open the page as bns-web.html#family (or use the
  // button in About). No editing, no saving, nothing to break.
  family: location.hash === '#family',
};
const $ = (id) => document.getElementById(id);
const uuid = () => (crypto.randomUUID ? crypto.randomUUID()
  : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 3 | 8)).toString(16);
    }));
const nowIso = () => new Date().toISOString();
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
function prettyWhen(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function prettyRecurrence(r) {
  switch (r.recurrenceType) {
    case 'daily': return 'Every day';
    case 'weekdays': return 'Weekdays (Mon–Fri)';
    default: {
      const days = (r.daysOfWeek || []).map(i => DAY_NAMES[i] ?? '?').join(', ');
      return days ? 'On ' + days : 'Custom days';
    }
  }
}
function appliesToday(r) {
  if (r.isActive === false) return false;
  const dow = new Date().getDay(); // 0=Sun..6=Sat — same convention as the app
  if (r.recurrenceType === 'daily') return true;
  if (r.recurrenceType === 'weekdays') return dow >= 1 && dow <= 5;
  return (r.daysOfWeek || []).includes(dow);
}
function markDirty() {
  S.dirty = true;
  updateSaveBar();
}
function celebrate(x, y) {
  const picks = ['✨', '🎉', '🌿', '💚', '⭐'];
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('span');
    s.className = 'spark';
    s.textContent = picks[i % picks.length];
    s.style.left = (x + (Math.random() * 90 - 45)) + 'px';
    s.style.top = (y - 10 + Math.random() * 20) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1050);
  }
}

/* ============================================================
   Open / save
   ============================================================ */
async function openBytes(bytes, name, handle) {
  try {
    const parsed = await parseBns(bytes);
    S.manifest = parsed.manifest;
    S.data = parsed.data;
    S.data.routines ??= [];
    S.data.events ??= [];
    S.data.captures ??= [];
    S.data.completionLogs ??= [];
    S.data.settings ??= {};
    S.audio = parsed.audio;
    S.sealed = parsed.sealed;
    S.marked = parsed.marked;
    S.fileName = name;
    S.handle = handle || null;
    S.dirty = false;
    S.tab = 'today';
    S.notice = null;
    // A family-share file contains ONLY what the person chose to share —
    // open it straight into the family view, that's what it's for. A normal
    // backup resets to the full manager (unless the URL asked for #family).
    S.family = parsed.manifest.familyShare === true || location.hash === '#family';
    render();
  } catch (err) {
    S.notice = { kind: 'err', text: (err instanceof BnsError) ? err.message
      : 'Could not open this file. It may not be a BNS backup.' };
    render();
  }
}
async function pickFile() {
  if (window.showOpenFilePicker) {
    try {
      const [h] = await window.showOpenFilePicker({
        types: [{ description: 'BNS backup', accept: { 'application/x-bns': ['.bns'] } }],
      });
      const f = await h.getFile();
      await openBytes(new Uint8Array(await f.arrayBuffer()), f.name, h);
      return;
    } catch (e) { if (e && e.name === 'AbortError') return; /* fall through */ }
  }
  $('fileinput').click();
}
function startFresh() {
  const deviceId = 'web-' + uuid();
  S.manifest = {
    formatVersion: 2, mediaType: BNS_MEDIA_TYPE,
    container: 'zip (PKWARE APPNOTE) + deflate/gzip (RFC 1951/1952) + json',
    exportedAt: nowIso(), deviceId, deviceName: 'BNS Web',
    appVersion: 'web-1.0', schema: 'bns/v2',
  };
  S.data = {
    routines: [], events: [], captures: [], completionLogs: [],
    settings: { deviceId, deviceName: 'BNS Web', themeMode: 'system', retentionDays: 14 },
  };
  S.audio = [];
  S.sealed = true; S.marked = true;
  S.fileName = 'BNS_Backup_new.bns';
  S.handle = null; S.dirty = true; S.tab = 'today'; S.notice = null;
  render();
}
function countItems() {
  return (S.data.routines?.length || 0) + (S.data.events?.length || 0) +
    (S.data.captures?.length || 0) + (S.data.completionLogs?.length || 0);
}
async function saveBns(saveAs) {
  S.manifest = {
    ...S.manifest,
    formatVersion: 2, mediaType: BNS_MEDIA_TYPE,
    exportedAt: nowIso(), editedBy: 'bns-web/1.0',
    audioCount: S.audio.length, totalItems: countItems(),
    dataCompressed: true, dataFormat: 'gzip+json',
  };
  const bytes = await buildBns({ manifest: S.manifest, data: S.data, audio: S.audio });
  const suggested = S.fileName || 'BNS_Backup.bns';
  if (window.showSaveFilePicker && (saveAs || !S.handle)) {
    try {
      S.handle = await window.showSaveFilePicker({
        suggestedName: suggested,
        types: [{ description: 'BNS backup', accept: { 'application/x-bns': ['.bns'] } }],
      });
      S.fileName = S.handle.name;
    } catch (e) { if (e && e.name === 'AbortError') return; S.handle = null; }
  }
  if (S.handle && !saveAs) {
    const w = await S.handle.createWritable();
    await w.write(bytes);
    await w.close();
  } else if (S.handle && saveAs) {
    const w = await S.handle.createWritable();
    await w.write(bytes);
    await w.close();
  } else {
    // Universal fallback (iPhone Safari etc.): download / share sheet.
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([bytes], { type: BNS_MEDIA_TYPE }));
    a.download = suggested;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  }
  S.dirty = false;
  S.notice = { kind: 'ok', text: 'Saved. Sealed with SHA-256 — the app will verify it on import. ✓' };
  render();
}
function updateSaveBar() {
  const bar = $('savebar');
  if (!S.data || S.family) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  $('fname').textContent = S.fileName || 'new .bns';
  $('dirtydot').style.display = S.dirty ? 'inline' : 'none';
}

function showDialog(html, onSubmit) {

const tagsToStr = (t) => (t || []).join(', ');
const strToTags = (s) => s.split(',').map(x => x.trim()).filter(Boolean);

/* ============================================================
   Views
   ============================================================ */
function render() {
  const main = $('main');
  updateSaveBar();
  if (!S.data) { main.innerHTML = emptyView(); wireEmpty(); return; }
  if (S.family) { familyView(main); return; }

  const seal = S.sealed
    ? `<div class="banner ok">✓ Verified — CRC + SHA-256 integrity seal intact. This is a genuine, untampered .bns.</div>`
    : `<div class="banner warn">Opened a legacy v1 backup (no integrity seal — structure checks passed). Saving upgrades it to sealed v2.</div>`;
  const notice = S.notice ? `<div class="banner ${S.notice.kind}">${esc(S.notice.text)}</div>` : '';

  const tabs = [['today', 'Today'], ['routines', 'Routines'], ['calendar', 'Calendar'],
    ['memories', 'Memories'], ['diary', 'Diary'], ['about', 'About']];
  main.innerHTML = notice + seal + `
    <nav class="tabs">${tabs.map(([id, label]) =>
      `<button data-tab="${id}" class="${S.tab === id ? 'on' : ''}">${label}</button>`).join('')}</nav>
    <div id="view"></div>`;
  main.querySelectorAll('nav.tabs button').forEach(b =>
    b.onclick = () => { S.tab = b.dataset.tab; S.notice = null; render(); });
  const view = $('view');
  ({ today: todayView, routines: routinesView, calendar: calendarView,
     memories: memoriesView, diary: diaryView, about: aboutView }[S.tab])(view);
}

  const base = cap.audioPath.split(/[\\/]/).pop();

  if (!hit) return null;
  const type = base.endsWith('.wav') ? 'audio/wav' : 'audio/mp4';
  return URL.createObjectURL(new Blob([hit.bytes], { type }));
}

      ${due.length === 0
        ? `<p style="font-size:16px">A quiet day — quiet days are good days. 🌿</p>`
        : `<p style="font-size:16px; line-height:1.9">${due.map(r => {
            const log = logsToday.find(l => l.routineId === r.id);
            const mark = log ? (log.status === 'done' ? '✅' : '🌿') : '⬜';
            return `${mark} ${esc(r.title)}${r.time ? ' <span style="color:var(--muted)">(' + esc(r.time) + ')</span>' : ''}`;
          }).join('<br>')}</p>
          <p class="sub">${handled.length} of ${due.length} handled — showing up counts, skipping on purpose counts too.</p>`}
    </div>`}
    ${upcoming.length ? `<div class="card">
      <h3>Coming up</h3>
      <p style="font-size:15px; line-height:1.9">${upcoming.map(e =>
        `📅 ${esc(e.date === today ? 'Today' : new Date(e.date + 'T12:00').toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' }))}${e.time ? ' ' + esc(e.time) : ''} — ${esc(e.title)}`
      ).join('<br>')}</p>
    </div>` : (shareOnly ? `<div class="card"><p style="font-size:15px">Nothing shared right now — no news is fine news. 🌿</p></div>` : '')}
    ${!shareOnly && memories.length ? `<div class="card">
      <h3>Recent moments</h3>
      ${memories.map(c => `<p style="font-size:14.5px; margin:8px 0">💭 ${esc(c.text || c.contextNote)}
        <span style="color:var(--muted); font-size:12px"> — ${prettyWhen(c.at)}</span></p>`).join('')}
    </div>` : ''}
    <div class="card" style="text-align:center">
      <p style="font-size:15px">${shareOnly
        ? 'Being asked to remember is trust. Thanks for being there for ' + esc(name) + '. 💚'
        : 'Whatever today looked like — ' + esc(name) + ' showed up. That counts. 💚'}</p>
    </div>
    <div class="row" style="justify-content:center; margin:14px 0 30px">
      ${shareOnly ? '' : `<button class="small ghost" id="exitfamily">Full view</button>`}
    </div>`;
  const exit = $('exitfamily');
  if (exit) exit.onclick = () => {
    S.family = false;
    if (location.hash === '#family') history.replaceState(null, '', location.pathname);
    render();
  };
}

/* ---------- About ---------- */
function aboutView(view) {
  const m = S.manifest || {};
  view.innerHTML = `<div class="card about">
    <h3>This file</h3>
    <p>${esc(S.fileName || 'new')} — from <b>${esc(m.deviceName || 'unknown device')}</b>,
    exported ${m.exportedAt ? prettyWhen(m.exportedAt) : 'unknown'}.
    ${S.marked ? 'Carries the BNS identity marker.' : 'Legacy file (no marker yet).'}
    ${S.sealed ? 'SHA-256 sealed.' : ''}</p>
    <h3>How sync works (no server, ever)</h3>
    <p>The .bns file <b>is</b> the sync. Save here, then get the file to your other
    device any way you like — AirDrop, the Files app, USB stick, network share,
    or the BNS app's own paired LAN sync between installed devices. The app
    verifies the cryptographic seal, then merges (newest change wins). This page
    never talks to any network: no upload, no account, no traces.</p>
    <h3>iPhone tip</h3>
    <p>Open this page in Safari → Share → <b>Add to Home Screen</b>. It becomes an
    app-shaped door to your .bns — no App Store needed. Saving hands you the
    updated file for the Files app or AirDrop.</p>
    <h3>Family view 👪</h3>
    <p>A read-only window for a caregiver's or kid's computer: today's list,
    what's coming up, and recent good moments — big text, nothing to break,
    nothing personal beyond what helps them help. Open this page as
    <b>bns-web.html#family</b> to land straight in it.</p>
    <div class="row"><button class="ghost" id="familybtn">Switch to family view</button></div>
    <h3>Open technology, credited</h3>
    <p>ZIP (PKWARE APPNOTE), DEFLATE/GZIP (RFC 1951/1952), JSON (ECMA-404) and
    SHA-256 (WebCrypto) — used exactly as published, no ownership claimed.
    Reads both BNS containers: zip-v2 and the bns2-v1 binary format.
    What's BNS is the arrangement: the identity marker, the sealed manifest,
    and the kindness.</p>
  </div>`;
  view.querySelector('#familybtn').onclick = () => {
    S.family = true;
    history.replaceState(null, '', '#family');
    render();
  };
}

/* ============================================================
   Wiring
   ============================================================ */
$('fileinput').onchange = async (e) => {
  const f = e.target.files[0];
  if (f) await openBytes(new Uint8Array(await f.arrayBuffer()), f.name, null);
  e.target.value = '';
};
$('savebtn').onclick = () => saveBns(false);
$('saveasbtn').onclick = () => saveBns(true);
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
    e.preventDefault();
    if (S.data) saveBns(false);
  }
});
document.addEventListener('dragover', (e) => {
  e.preventDefault();
  $('dropzone')?.classList.add('hover');
});
document.addEventListener('dragleave', () => $('dropzone')?.classList.remove('hover'));
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  $('dropzone')?.classList.remove('hover');
  const item = e.dataTransfer?.items?.[0];
  let handle = null;
  if (item && item.getAsFileSystemHandle) {
    try { handle = await item.getAsFileSystemHandle(); } catch (_) { /* fallback */ }
  }
  const f = e.dataTransfer?.files?.[0];
  if (f) await openBytes(new Uint8Array(await f.arrayBuffer()), f.name,
    handle && handle.kind === 'file' ? handle : null);
});
window.addEventListener('beforeunload', (e) => {
  if (S.dirty) { e.preventDefault(); e.returnValue = ''; }
});
window.addEventListener('hashchange', () => {
  S.family = location.hash === '#family';
  render();
});
render();
</script>
</body>
</html>
