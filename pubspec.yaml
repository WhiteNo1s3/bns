name: bns
description: "BNS — Gentle support for routines, memory, reminders and feeling good. Privacy-first, LAN-sync only, cross-platform (Android, iOS, macOS, Windows, Linux). Built for neurological needs including executive dysfunction and TBI."
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local persistence is a dependency-free JSON snapshot store
  # (lib/data/local/isar_service.dart). No database packages, no codegen.

  # .bns archive + files
  archive: ^3.6.1
  path_provider: ^2.1.4
  # 10.x is the newest line compatible with Flutter's current (legacy-Kotlin)
  # Gradle path; 11+ requires AGP built-in Kotlin which Flutter doesn't support yet.
  file_picker: ^10.3.7

  # Navigation & state
  go_router: ^14.2.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # UI / fun / accessibility
  confetti: ^0.7.0

  # Calendar & dates
  table_calendar: ^3.1.2
  intl: ^0.19.0

  # Reminders & notifications (not supported on Windows — guarded in code)
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # Voice quick capture
  # 6.x is the newest line compatible with the legacy-Kotlin Gradle path (see file_picker note)
  record: ^6.2.1
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  # Device speech engine (free, on-device, no cloud AI, no subscriptions):
  # speaks the gentle prompt when a widget starts a voice capture.
  flutter_tts: ^4.0.2

  # Utils
  uuid: ^4.4.2
  path: ^1.9.0   # for audio path manipulation

  # Encryption for secure first-time pairing + transfers
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # Android home widget (gadget). 0.9.3 needs Dart 3.10+ / newer Flutter;
  # 0.9.2 works on the stable ladder we build with (see AGP notes).
  home_widget: 0.9.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/bns_icon.png
    - assets/icon/bns_logo.png
    # Gentle illustrations and assets for happy, low-load UI
    # - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/bns_icon.png"  # The happy green smiling brain - accepted icon for BNS. Positive, uplifting for neuro support, brain fog management with happy tone. Fits every angle. High-profile iOS target too.
  adaptive_icon_background: "#14B8A6"  # Relaxing teal from theme
  adaptive_icon_foreground: "assets/icon/bns_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/bns_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/bns_icon.png"
    icon_size: 256
